services:

  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3000:4321"
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - proxy

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true
    name: nfs-network