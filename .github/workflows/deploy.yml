name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      # Use locally installed tsc from node_modules, not npx
      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy to NAS
        env:
          SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Test cloudflared access first
          echo "Testing cloudflared access..."
          cloudflared access ssh --hostname ssh.marcuslchong.com --help 2>&1 || true

          # Verify env vars are set (show length only, not value)
          echo "CF_ACCESS_CLIENT_ID length: ${#CF_ACCESS_CLIENT_ID}"
          echo "CF_ACCESS_CLIENT_SECRET length: ${#CF_ACCESS_CLIENT_SECRET}"

          ssh -v -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ProxyCommand="cloudflared access ssh --hostname ssh.marcuslchong.com --loglevel debug" \
            ${{ secrets.NAS_USER }}@ssh.marcuslchong.com << 'ENDSSH'
            set -e
            echo "→ Pulling latest code..."
            cd /nfs/my-portfolio
            git pull origin main
            echo "→ Rebuilding Docker image..."
            docker compose up -d --build
            echo "→ Cleaning up old images..."
            docker image prune -f
            echo "✓ Deploy complete"
          ENDSSH

          rm /tmp/deploy_key