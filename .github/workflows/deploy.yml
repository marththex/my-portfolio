name: Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      # Use locally installed tsc from node_modules, not npx
      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy to NAS
        env:
          SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          echo "Token ID length: ${#TUNNEL_SERVICE_TOKEN_ID}"
          echo "Token Secret length: ${#TUNNEL_SERVICE_TOKEN_SECRET}"

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ProxyCommand="TUNNEL_SERVICE_TOKEN_ID=$TUNNEL_SERVICE_TOKEN_ID TUNNEL_SERVICE_TOKEN_SECRET=$TUNNEL_SERVICE_TOKEN_SECRET cloudflared access ssh --hostname ssh.marcuslchong.com" \
            ${{ secrets.NAS_USER }}@ssh.marcuslchong.com << 'ENDSSH'
            set -e
            echo "→ Pulling latest code..."
            cd /nfs/my-portfolio
            git pull origin main
            echo "→ Rebuilding Docker image..."
            docker compose up -d --build
            echo "→ Cleaning up old images..."
            docker image prune -f
            echo "✓ Deploy complete"
          ENDSSH

          rm /tmp/deploy_key