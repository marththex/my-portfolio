# TEMPORARY — one-off recovery after the force-push on 2026-06-10.
# The NAS clone diverged from the rewritten main, so deploy.yml's
# `git pull` cannot fast-forward. This workflow hard-resets the NAS
# clone to origin/main and rebuilds. Delete this file once it has run.
name: NAS reset (one-off)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  reset:
    name: Reset NAS clone & redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Reset and redeploy on NAS
        env:
          SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ProxyCommand="cloudflared access tcp --hostname ssh.marcuslchong.com" \
            ${{ secrets.NAS_USER }}@ssh.marcuslchong.com << 'ENDSSH'
          set -e
          cd /nfs/my-portfolio
          git fetch origin main
          git reset --hard origin/main
          git config pull.ff only
          docker compose up -d --build
          docker image prune -f
          echo "✓ NAS reset & redeploy complete"
          ENDSSH

          rm /tmp/deploy_key
